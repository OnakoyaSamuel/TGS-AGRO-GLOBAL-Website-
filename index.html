<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TGS AGRO GLOBAL LIMITED</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: 'Segoe UI', sans-serif;
scroll-behavior:smooth;
}

body{
background:#f5f7f6;
color:#333;
line-height:1.6;
}

/* ===== NAVIGATION ===== */
header{
position:fixed;
top:0;
width:100%;
background:
linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)),
url("download (3).jpeg") center/cover no-repeat;
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 8%;
box-shadow:0 4px 20px rgba(0,0,0,0.05);
z-index:1000;
}

.logo{
font-weight:700;
font-size:20px;
color:white;
}

nav a{
margin-left:30px;
text-decoration:none;
color:white;
font-weight:500;
transition:0.3s;
}

nav a:hover{
color:#a5d6a7;
}

/* ===== HERO ===== */
.hero{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
background:
linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)),
url("download (3).jpeg") center/cover no-repeat;
color:white;
padding:0 20px;
}

.hero h1{
font-size:48px;
margin-bottom:20px;
max-width:800px;
}

.hero p{
font-size:20px;
margin-bottom:30px;
}

.btn{
background:#2e7d32;
color:white;
padding:15px 35px;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
text-decoration:none;
transition:0.3s;
}

.btn:hover{
background:#1b5e20;
transform:translateY(-3px);
}

/* ===== GENERAL SECTIONS ===== */
section{
padding:100px 8%;
}

.section-title{
text-align:center;
margin-bottom:60px;
font-size:34px;
color:#1b5e20;
}

/* ===== ABOUT ===== */
.about p{
max-width:800px;
margin:auto;
text-align:center;
font-size:18px;
}

/* ===== SERVICES ===== */
.services{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:30px;
}

.service-card{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.05);
transition:0.3s;
}

.service-card:hover{
transform:translateY(-10px);
}

.service-card h3{
margin-bottom:15px;
color:#2e7d32;
}

/* ===== STATS ===== */
.stats{
display:flex;
justify-content:space-around;
flex-wrap:wrap;
text-align:center;
}

.stat{
margin:20px;
}

.stat h2{
font-size:42px;
color:#2e7d32;
}

/* ===== TESTIMONIALS ===== */
.testimonials{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
}

.testimonial{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.05);
}

.testimonial strong{
color:#1b5e20;
}

/* ===== BOOKING ===== */
form{
max-width:600px;
margin:auto;
display:flex;
flex-direction:column;
}

form input, form select, form textarea{
margin-bottom:15px;
padding:14px;
border-radius:6px;
border:1px solid #ccc;
font-size:14px;
}

form button{
margin-top:10px;
}

/* ===== FOOTER ===== */
footer{
background:#1b5e20;
color:white;
text-align:center;
padding:30px;
}

footer p{
margin:5px 0;
}
</style>
</head>

<body>

<header>
<div class="logo">
TGS AGRO GLOBAL LIMITED<br>
<small style="font-size:12px;color:#eee;">Feeding the World</small>
</div>

<nav>
<a href="#about">About</a>
<a href="#services">Services</a>
<a href="#stats">Impact</a>
<a href="#booking">Book</a>
</nav>
</header>

<!-- HERO -->
<section class="hero">
<div>
<h1>Transforming Agriculture Through Innovation</h1>
<p>We combine agriculture, farm supplies, and technology to serve farmers, investors, governments and global markets.</p>
<a href="#booking" class="btn">Book Consultation</a>
</div>
</section>
